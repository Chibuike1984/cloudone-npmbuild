<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <link rel="stylesheet" href="/public/boostrap/bootstrap-icons/bootstrap-icons.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f7f7f7;
        color: #333;
      }
      img {
        width: 100px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 10px;
      }
      p {
        font-size: 1rem;
      }
      .offline-icon {
        font-size: 3rem;
        color: #4DBA87;
        margin-bottom: 20px;
      }
      button {
        background: #4DBA87;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 1rem;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 20px;
      }
      button:hover {
        background: #3b9769;
      }
    </style>
  </head>
  <body>
    <i class="bi bi-wifi-off offline-icon"></i>
    <img src="/pwa-192x192.png" alt="App Logo" />
    <h1>You are offline</h1>
    <p>Please check your internet connection.</p>
    <button onclick="window.location.reload()">Retry</button>
  </body>
</html>
